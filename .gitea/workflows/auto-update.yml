name: Auto Update Workflows

on:
  schedule:
    - cron: '0 3 * * *'  # 毎日 3:00 AM
  workflow_dispatch:       # 手動実行も可能

jobs:
  update:
    if: github.repository != 'mygitea-actions/claude-code-gitea-action'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.MYGITEA_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "gitea-actions[bot]"
          git config user.email "gitea-actions[bot]@noreply.localhost"

      - name: Update workflows
        run: |
          REMOTE_NAME="actions-dist"
          REMOTE_URL="https://x-access-token:${{ secrets.MYGITEA_TOKEN }}@REDACTED_HOST/mygitea-actions/actions-dist.git"
          PREFIX=".gitea/workflows"

          git remote get-url "$REMOTE_NAME" 2>/dev/null || git remote add "$REMOTE_NAME" "$REMOTE_URL"
          git remote set-url "$REMOTE_NAME" "$REMOTE_URL"

          if git ls-files "$PREFIX/" 2>/dev/null | grep -q .; then
            git subtree pull --prefix="$PREFIX" "$REMOTE_NAME" main --squash \
              -m "Update $PREFIX from $REMOTE_NAME" || echo "No changes or already up to date"
          else
            echo "No workflows subtree found, skipping"
          fi

      - name: Push changes
        run: |
          if [ -n "$(git log origin/main..HEAD --oneline)" ]; then
            git push
          else
            echo "Nothing to push"
          fi
