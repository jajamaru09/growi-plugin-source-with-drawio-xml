name: Claude Assistant

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude-response:
    if: |
      (github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '@claude-bot')) ||
      (github.event_name == 'issues' &&
        contains(github.event.issue.body, '@claude-bot'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Notify Slack — Claude started
        run: |
          if [ "${{ github.event_name }}" = "issues" ]; then
            LINK="${{ secrets.MYGITEA_PUBLIC_URL }}/${{ github.repository }}/issues/${{ github.event.issue.number }}"
            TITLE="Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}"
          elif [ "${{ github.event_name }}" = "issue_comment" ]; then
            LINK="${{ secrets.MYGITEA_PUBLIC_URL }}/${{ github.repository }}/issues/${{ github.event.issue.number }}"
            TITLE="Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}"
          else
            LINK="${{ secrets.MYGITEA_PUBLIC_URL }}/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}"
            TITLE="PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}"
          fi

          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H 'Content-type: application/json' \
            -d "{
              \"attachments\": [{
                \"color\": \"#888888\",
                \"title\": \":hourglass_flowing_sand: Claude が処理を開始しました\",
                \"text\": \"<$LINK|$TITLE>\",
                \"fields\": [
                  {\"title\": \"リポジトリ\", \"value\": \"${{ github.repository }}\", \"short\": true},
                  {\"title\": \"by\",         \"value\": \"${{ github.event.sender.login }}\", \"short\": true}
                ]
              }]
            }"

      - name: Run Claude
        id: claude
        uses: markwylde/claude-code-gitea-action@v1.0.20
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          gitea_token: ${{ secrets.MYGITEA_TOKEN }}
          trigger_phrase: "@claude-bot"
          claude_git_name: claude-bot
          claude_git_email: claude-bot@noreply.localhost
        env:
          GITEA_SERVER_URL: "http://192.168.10.113:8082"

      - name: Notify Slack — Claude responded
        if: always()
        run: |
          if [ "${{ github.event_name }}" = "issues" ]; then
            LINK="${{ secrets.MYGITEA_PUBLIC_URL }}/${{ github.repository }}/issues/${{ github.event.issue.number }}"
            TITLE="Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}"
          elif [ "${{ github.event_name }}" = "issue_comment" ]; then
            LINK="${{ secrets.MYGITEA_PUBLIC_URL }}/${{ github.repository }}/issues/${{ github.event.issue.number }}"
            TITLE="Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}"
          else
            LINK="${{ secrets.MYGITEA_PUBLIC_URL }}/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}"
            TITLE="PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}"
          fi

          if [ "${{ steps.claude.outcome }}" = "success" ]; then
            EMOJI=":robot_face: Claude が返答しました"
            COLOR="good"
          else
            EMOJI=":warning: Claude の実行に失敗しました"
            COLOR="danger"
          fi

          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H 'Content-type: application/json' \
            -d "{
              \"attachments\": [{
                \"color\": \"$COLOR\",
                \"title\": \"$EMOJI\",
                \"text\": \"<$LINK|$TITLE>\",
                \"fields\": [
                  {\"title\": \"リポジトリ\", \"value\": \"${{ github.repository }}\", \"short\": true},
                  {\"title\": \"by\",         \"value\": \"${{ github.event.sender.login }}\", \"short\": true}
                ]
              }]
            }"