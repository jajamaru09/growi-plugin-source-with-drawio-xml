name: Deploy to actions-dist

on:
  push:
    branches: [main]

jobs:
  deploy:
    if: github.repository == 'mygitea-actions/claude-code-gitea-action'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone actions-dist
        run: |
          git clone "https://x-access-token:${{ secrets.MYGITEA_TOKEN }}@REDACTED_HOST/mygitea-actions/actions-dist.git" dist-repo

      - name: Sync workflows
        run: |
          rm -f dist-repo/*.yml dist-repo/*.yaml
          cp .gitea/workflows/*.yml dist-repo/ 2>/dev/null || true
          cp .gitea/workflows/*.yaml dist-repo/ 2>/dev/null || true
          # .claude サブディレクトリもコピー
          if [ -d ".gitea/workflows/.claude" ]; then
            cp -r .gitea/workflows/.claude dist-repo/
          fi

      - name: Commit and push
        run: |
          cd dist-repo
          git config user.name "gitea-actions[bot]"
          git config user.email "gitea-actions[bot]@noreply.localhost"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "sync: update workflows [skip ci]"
            git push
          fi
